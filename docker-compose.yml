services:
  orc:
    image: niradler/orc:latest
    # Or build locally:
    # build: .
    ports:
      - "7700:7700"
    environment:
      # Required: Anthropic API key for SDK-mode agent execution
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Optional: shared secret for API auth
      - ORC_SECRET=${ORC_SECRET:-changeme}
      # Agent backend: "claude" (SDK, direct API) or "acpx" (host bridge)
      - ORC_AGENT_LOOP_DEFAULT_BACKEND=${ORC_AGENT_LOOP_DEFAULT_BACKEND:-claude}
      # Telegram gateway (optional)
      - ORC_TELEGRAM_BOT_TOKEN=${ORC_TELEGRAM_BOT_TOKEN:-}
    volumes:
      # Persistent ORC data: SQLite DB, logs, sessions
      - orc-data:/data
      # ── Agent auth mounts (read-only) ─────────────────────────────────────
      # Claude Code credentials — required if using ACPX with claude agent
      - ${HOME}/.claude:/home/orc/.claude:ro
      # Codex credentials
      # - ${HOME}/.config/codex:/home/orc/.config/codex:ro
      #
      # ── Host-side task execution via agentapi ─────────────────────────────
      # agentapi (https://github.com/coder/agentapi) wraps any coding agent
      # (claude, codex, aider…) on the HOST behind an HTTP+SSE interface.
      # Run it on the host:
      #   agentapi server --allowed-hosts '*' -- claude --allowedTools all
      # Then point ORC at it:
      # - ORC_AGENT_LOOP_DEFAULT_BACKEND=agentapi
      # - AGENTAPI_URL=http://host.docker.internal:3284
      #
      # Mount your workspace directories so in-container acpx can edit files:
      # - ${HOME}/projects:/home/orc/projects:rw
    restart: unless-stopped
    # Allows ORC to reach host services at host.docker.internal (agent bridge)
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  orc-data:
