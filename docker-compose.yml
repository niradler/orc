services:
  orc:
    image: niradler/orc:latest
    # Or build locally:
    # build: .
    ports:
      - "7700:7700"
    environment:
      # Anthropic API key (required only for the "claude" backend; not needed for "agentapi")
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Shared secret for API bearer auth. The container binds 0.0.0.0, so set
      # this to a strong value (e.g. `openssl rand -hex 32`) before exposing the
      # mapped port beyond localhost — every endpoint, including job execution,
      # is otherwise unauthenticated. Empty = no auth (localhost-only use).
      - ORC_API_SECRET=${ORC_API_SECRET:-}
      # Telegram gateway (optional)
      - ORC_TELEGRAM_TOKEN=${ORC_TELEGRAM_TOKEN:-}

      # ── Agent backend ──────────────────────────────────────────────────────
      # "agentapi" → delegates task execution to a coder/agentapi server running
      #              on the host (http://host.docker.internal:3284).
      #              The agentapi process wraps your local coding agent (claude,
      #              codex, aider…) and exposes it over HTTP+SSE.
      #              Start it on the host first:
      #                agentapi server --allowed-hosts '*' -- claude --allowedTools all
      #
      # "claude"   → calls the Anthropic API directly via SDK (no host CLI needed).
      #
      # ── MCP for the host agent ─────────────────────────────────────────────
      # ORC exposes MCP over Streamable HTTP at http://localhost:7700/mcp so the
      # host agent can call task_update, memory_*, knowledge_*, etc.
      #
      # Pass the server explicitly to the host claude process — agentapi does
      # not auto-load project/local .mcp.json entries for its claude subprocess,
      # so rely on --mcp-config rather than `claude mcp add`:
      #
      #   agentapi server --allowed-hosts '*' -- \
      #     claude --allowedTools all \
      #            --mcp-config '{"mcpServers":{"orc":{"type":"http","url":"http://localhost:7700/mcp"}}}'
      #
      - ORC_API_HOST=0.0.0.0
      - ORC_AGENT_LOOP_DEFAULT_BACKEND=${ORC_AGENT_LOOP_DEFAULT_BACKEND:-agentapi}
      - AGENTAPI_URL=${AGENTAPI_URL:-http://host.docker.internal:3284}

    volumes:
      # Persistent ORC data: SQLite DB, logs, sessions
      - orc-data:/data
      # Claude Code auth (needed only if using agentapi with claude agent on host)
      - ${HOME}/.claude:/home/orc/.claude:ro

    restart: unless-stopped
    # Lets the container resolve host.docker.internal → the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  orc-data:
